<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520" role="img" aria-labelledby="title desc">
  <title id="title">DecisionGraph Hero Banner</title>
  <desc id="desc">A bold banner showing DecisionGraph as an engineering decision memory system.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1f2e"/>
      <stop offset="55%" stop-color="#113a4f"/>
      <stop offset="100%" stop-color="#0f6f83"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1400" height="520" fill="url(#bg)"/>

  <g opacity="0.28">
    <circle cx="170" cy="90" r="95" fill="#33d0ff"/>
    <circle cx="1270" cy="420" r="150" fill="#2be3b5"/>
    <circle cx="1010" cy="110" r="55" fill="#ffffff"/>
  </g>

  <g transform="translate(86 76)">
    <rect width="860" height="368" rx="28" fill="url(#card)" stroke="#b9f1ff" stroke-opacity="0.35"/>

    <text x="48" y="104" fill="#e8fbff" font-family="Segoe UI, Arial, sans-serif" font-size="64" font-weight="700">
      DecisionGraph
    </text>
    <text x="48" y="156" fill="#b8eef8" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="500">
      Engineering Decision Memory System
    </text>

    <g transform="translate(48 208)">
      <rect x="0" y="0" width="190" height="54" rx="12" fill="#1f5f7d" stroke="#86e7ff"/>
      <text x="95" y="34" text-anchor="middle" fill="#eaffff" font-family="Segoe UI, Arial, sans-serif" font-size="22">Ingest</text>

      <rect x="220" y="0" width="210" height="54" rx="12" fill="#215d69" stroke="#96f7d3"/>
      <text x="325" y="34" text-anchor="middle" fill="#ecfffb" font-family="Segoe UI, Arial, sans-serif" font-size="22">Reason</text>

      <rect x="460" y="0" width="210" height="54" rx="12" fill="#225168" stroke="#9fe7ff"/>
      <text x="565" y="34" text-anchor="middle" fill="#eaf9ff" font-family="Segoe UI, Arial, sans-serif" font-size="22">Guardrail</text>

      <path d="M193 27 L214 27" stroke="#9de9ff" stroke-width="3"/>
      <path d="M433 27 L454 27" stroke="#9de9ff" stroke-width="3"/>
    </g>

    <text x="48" y="328" fill="#c2f2ff" font-family="Consolas, 'Courier New', monospace" font-size="21">
      why / who / when / what-changed - with evidence
    </text>
  </g>

  <g transform="translate(980 120)">
    <circle cx="80" cy="80" r="66" fill="#0e3a4d" stroke="#8beaff" stroke-width="2"/>
    <circle cx="80" cy="80" r="30" fill="#78e8ff" filter="url(#glow)"/>
    <circle cx="185" cy="160" r="52" fill="#12485d" stroke="#98f9da" stroke-width="2"/>
    <circle cx="32" cy="208" r="44" fill="#144c60" stroke="#a4ecff" stroke-width="2"/>
    <line x1="128" y1="120" x2="154" y2="141" stroke="#baf7ff" stroke-width="3"/>
    <line x1="62" y1="141" x2="43" y2="167" stroke="#baf7ff" stroke-width="3"/>
  </g>
</svg>
