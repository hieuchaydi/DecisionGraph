<svg xmlns="http://www.w3.org/2000/svg" width="960" height="240" viewBox="0 0 960 240" role="img" aria-labelledby="title desc">
  <title id="title">DecisionGraph Logo</title>
  <desc id="desc">DecisionGraph wordmark with connected graph icon</desc>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b6d8a"/>
      <stop offset="100%" stop-color="#17b28d"/>
    </linearGradient>
  </defs>

  <rect width="960" height="240" fill="#ffffff"/>

  <g transform="translate(64 42)">
    <rect x="0" y="0" width="156" height="156" rx="30" fill="url(#g)"/>

    <circle cx="44" cy="46" r="11" fill="#ffffff"/>
    <circle cx="112" cy="44" r="11" fill="#ffffff"/>
    <circle cx="40" cy="112" r="11" fill="#ffffff"/>
    <circle cx="112" cy="114" r="11" fill="#ffffff"/>
    <circle cx="79" cy="79" r="13" fill="#ffffff"/>

    <line x1="44" y1="46" x2="79" y2="79" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
    <line x1="112" y1="44" x2="79" y2="79" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
    <line x1="40" y1="112" x2="79" y2="79" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
    <line x1="112" y1="114" x2="79" y2="79" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
    <line x1="44" y1="46" x2="112" y2="44" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
    <line x1="40" y1="112" x2="112" y2="114" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
  </g>

  <g transform="translate(260 77)">
    <text x="0" y="54" font-family="Segoe UI, Arial, sans-serif" font-size="64" font-weight="700" fill="#0e2d3c">Decision</text>
    <text x="284" y="54" font-family="Segoe UI, Arial, sans-serif" font-size="64" font-weight="700" fill="#0b7e8f">Graph</text>
    <text x="0" y="98" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="500" fill="#456778">Engineering decision memory</text>
  </g>
</svg>
