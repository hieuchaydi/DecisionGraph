name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run backend tests
        run: python -m pytest -q

      - name: Run benchmark gate
        env:
          DECISIONGRAPH_DATA_PATH: ${{ github.workspace }}/.ci/decisiongraph.json
        run: |
          decisiongraph init --reset
          decisiongraph benchmark-check \
            --dataset tools/ci_eval.jsonl \
            --seed-demo \
            --min-top1 0.65 \
            --min-keyword-coverage 0.65

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect frontend workspace
        id: frontend
        shell: bash
        run: |
          if [[ -f docs/package.json && -f docs/package-lock.json ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node
        if: steps.frontend.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: docs/package-lock.json

      - name: Install frontend dependencies
        if: steps.frontend.outputs.enabled == 'true'
        working-directory: docs
        shell: bash
        run: |
          npm ci --no-audit --no-fund || {
            echo "npm ci failed on runner, falling back to npm install";
            npm install --no-audit --no-fund;
          }

      - name: Run frontend lint
        if: steps.frontend.outputs.enabled == 'true'
        working-directory: docs
        run: npm run lint

      - name: Run frontend build
        if: steps.frontend.outputs.enabled == 'true'
        working-directory: docs
        run: npm run build

      - name: Frontend skipped
        if: steps.frontend.outputs.enabled != 'true'
        run: echo "Skipping frontend job because docs/package.json or docs/package-lock.json is missing."
